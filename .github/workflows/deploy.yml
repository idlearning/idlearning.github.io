name: Deploy to GitHub Pages

# Build the static site and publish it to GitHub Pages on every push to main.
# Requires the repo's Pages source to be set to "GitHub Actions"
# (Settings → Pages → Build and deployment → Source: GitHub Actions).

on:
  push:
    branches: [main]
  # Allow manual runs from the Actions tab, and remote triggers (e.g. a Google
  # Form's Apps Script calling the workflow_dispatch API when new content is added).
  workflow_dispatch:
  # Periodically re-pull the Google Sheet so content edits go live without a code
  # change. Hourly; adjust the cron as needed (times are UTC).
  schedule:
    - cron: "0 * * * *"

# Least-privilege permissions needed to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only keep the most recent deploy running; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Pull the latest content from the Google Sheet into src/data/generated/*.json.
      # No-op (keeps committed seeds) until a spreadsheetId is set in
      # scripts/sheets.config.json; a failed tab keeps its existing JSON.
      - name: Sync content from Google Sheet
        run: bun run sync

      - name: Build static site
        run: bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
